version: 2

project_name: rp

before:
  hooks:
    - go mod tidy
    - go test -short ./...

builds:
  - main: .
    binary: rp
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/deligoez/rp/cmd.version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

brews:
  - name: deligoez-rp
    repository:
      owner: deligoez
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    homepage: https://github.com/deligoez/rp
    description: "Repo manager CLI — organize, sync, and bootstrap your Developer workspace"
    license: "MIT"
    test: |
      assert_match "rp version", shell_output("#{bin}/rp --version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore\\(deps\\)"
      - "^docs\\(changelog\\)"
